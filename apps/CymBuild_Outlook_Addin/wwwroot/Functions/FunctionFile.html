<script>
    // Initialize Office and register handlers
    Office.onReady().then(() => {
        Office.actions.associate("handleNewMessageCompose", handleNewMessageCompose);
        Office.actions.associate("handleQuickAction", handleQuickAction);
    });

    // Add error handling
    function handleNewMessageCompose(event) {
        try {
            console.log("New message compose triggered");
            event.completed({ allowEvent: true });
        } catch (error) {
            event.completed({ allowEvent: false, error: error.message });
        }
    }
</script>
