<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />

    <!-- CSP: keep as ONE LINE and ensure the tag is properly closed.
         NOTE: frame-ancestors in a <meta> is ignored by browsers; it must be set as an HTTP response header.
         But we keep it here since you are working inside the add-in frame anyway. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: https://*.socotec.co.uk; base-uri 'self'; object-src 'none'; frame-ancestors 'self' https://outlook.office.com https://*.office.com https://office365.com; frame-src 'self' https://outlook.office.com https://*.office.com https://office365.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://appsforoffice.microsoft.com https://ajax.aspnetcdn.com https://cdn.jsdelivr.net https://code.jquery.com https://cdnjs.cloudflare.com https://alcdn.msauth.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; img-src 'self' data: https://*.socotec.co.uk https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; font-src 'self' data: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; connect-src 'self' https://bre.socotec.co.uk:9403 https://bre.socotec.co.uk:9404 https://*.socotec.co.uk https://login.microsoftonline.com https://graph.microsoft.com https://outlook.office.com https://office365.com https://*.office.com https://cdn.jsdelivr.net https://browser.events.data.microsoft.com https://eu-office.events.data.microsoft.com; worker-src 'self' blob:; manifest-src 'self';">

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no" />
    <title>CymBuild Outlook</title>
    <base href="/" />

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

    <link href="lib/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
    <link href="_content/Telerik.UI.for.Blazor/css/kendo-theme-default/all.css" rel="stylesheet" />

    <link href="css/app.css" rel="stylesheet" />
    <link href="css/Button.css" rel="stylesheet" />
    <link href="css/CymBuildBase.css" rel="stylesheet" />
    <link href="css/CymBuildCustom.css" rel="stylesheet" />
    <link href="css/MessageBanner.css" rel="stylesheet" />

    <!-- Telerik -->
    <script src="_content/Telerik.UI.for.Blazor/js/telerik-blazor.js"></script>

    <!-- Logging -->
    <script src="logging.js"></script>

    <!-- Office.js MUST be loaded before we call Office.onReady -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <!-- jQuery (only keep if you really need it) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body>
    <div id="app">
        <div class="main">
            <div class="content">
                <div class="container">
                    <h2>Preparing CymBuild Outlook, please wait…</h2>
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Your app scripts -->
    <script src="js/authConfig.js"></script>
    <script src="js/CymBuildFunctions.js"></script>
    <script src="js/MessageBanner.js"></script>
    <script src="js/MessageFiler.js"></script>
    <script src="js/site.js"></script>
    <script src="js/auth.js"></script>

    <!-- Blazor boot (delayed) -->
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>

    <script>
        (function () {
            let started = false;

            async function startBlazorOnce(reason) {
                if (started) return;
                started = true;

                try {
                    console.log(`[CymBuildOutlook] Starting Blazor (${reason})...`);
                    await Blazor.start();
                    console.log("[CymBuildOutlook] Blazor started.");
                } catch (e) {
                    console.error("[CymBuildOutlook] Blazor failed to start.", e);
                }
            }

            function wireOfficeReady() {
                try {
                    if (window.Office && typeof Office.onReady === "function") {
                        Office.onReady((info) => {
                            console.log("[CymBuildOutlook] Office.onReady:", info);
                            // If this isn't Outlook, still start (helps when testing in browser)
                            startBlazorOnce(info && info.host ? `Office host=${info.host}` : "Office ready");
                        });
                        return true;
                    }
                } catch (e) {
                    console.error("[CymBuildOutlook] Error wiring Office.onReady", e);
                }
                return false;
            }

            const wired = wireOfficeReady();

            // Fallback: if Office never becomes available (browser testing), still boot Blazor
            if (!wired) {
                console.warn("[CymBuildOutlook] Office.onReady not available - starting Blazor via fallback timer.");
                setTimeout(() => startBlazorOnce("fallback (Office not ready)"), 500);
            }
        })();
    </script>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
</body>
</html>
