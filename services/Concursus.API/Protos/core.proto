}

message SageFetchSalesOrdersRequest {
  string dataset = 1;
  string order_id = 2;
  string filter_operator = 3;
  bool force = 4;
}

message SageSalesOrder {
  string account_reference = 1;
  string document_no = 2;
  google.protobuf.StringValue customer_order_no = 3;
  google.protobuf.StringValue document_date = 4;

  // Any source fields not yet formally mapped
  google.protobuf.Struct additional_fields = 5;
}

message SageFetchSalesOrdersResponse {
  string status = 1;
  string detail = 2;
  string raw_json = 3;       // legacy/debug
  string error_returned = 4;

  repeated SageSalesOrder sales_orders = 5;
}

message SageFetchCustomerTransactionsRequest {
  string dataset = 1;
  string account_reference = 2;
  string document_no = 3;
  int32 sys_trader_tran_type = 4;
  bool has_sys_trader_tran_type = 5;
  bool force = 6;
}

message SageCustomerTransaction {
  google.protobuf.StringValue transaction_reference = 1;
  google.protobuf.StringValue account_reference = 2;
  google.protobuf.StringValue second_reference = 3;
  google.protobuf.Int32Value sys_trader_tran_type = 4;
  google.protobuf.StringValue transaction_date = 5;

  google.protobuf.DoubleValue net_amount = 6;
  google.protobuf.DoubleValue tax_amount = 7;
  google.protobuf.DoubleValue gross_amount = 8;
  google.protobuf.DoubleValue outstanding_amount = 9;

  // Any source fields not yet formally mapped
  google.protobuf.Struct additional_fields = 10;
}

message SageFetchCustomerTransactionsResponse {
  string status = 1;
  string detail = 2;
  string raw_json = 3;       // legacy/debug
  string error_returned = 4;

  repeated SageCustomerTransaction transactions = 5;
}

