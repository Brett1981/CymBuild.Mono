message JobClosureDecisionRequest {
  int32 userId = 1;        // Authoriser identity ID (INT)
  string jobGuid = 2;      // Job GUID
  JobClosureDecisionType decision = 3;
  string comment = 4;      // Required for reject; optional for approve
}

message JobClosureDecisionResponse {
  bool success = 1;
  string message = 2;

  string jobGuid = 3;
  JobClosureDecisionType decision = 4;
  string storedComment = 5;           // comment actually persisted (defaulted for approve)
  google.protobuf.Timestamp decisionDateTimeUtc = 6;
}

// Generic Authorisation decision
enum AuthorisationDecisionType {
  AUTHORISATION_DECISION_UNSPECIFIED = 0;
  AUTHORISATION_DECISION_APPROVE = 1;
  AUTHORISATION_DECISION_REJECT = 2;
}

message AuthorisationDecisionRequest {
  int32 userId = 1;
  string recordGuid = 2;        // DataObjectGuid
  string entityTypeName = 3;    // "Enquiries", "Quotes", etc.
  bool approve = 4;             // true=approve false=reject
  string comment = 5;           // required for reject
}

message AuthorisationDecisionResponse {
  bool success = 1;
  string message = 2;

  string recordGuid = 3;
  string entityTypeName = 4;
  bool approve = 5;

  string storedComment = 6;
  google.protobuf.Timestamp decisionDateTimeUtc = 7;

  string fromStatusGuid = 8;
  string toStatusGuid = 9;
}

