message GetCymBuildSchemaDashboardRequest {
}

message GetCymBuildSchemaDashboardResponse {
  CymBuildSchemaSummaryContract summary = 1;
  repeated CymBuildSchemaObjectCountContract object_counts = 2;
  repeated CymBuildSchemaIntegrityCheckContract integrity_checks = 3;
  repeated CymBuildSchemaLargestTableContract largest_tables = 4;
  repeated CymBuildSchemaBoundObjectContract schema_bound_objects = 5;
}

message CymBuildSchemaSummaryContract {
  google.protobuf.Timestamp snapshot_utc = 1;
  int32 schemas_monitored = 2;
  int32 total_objects_monitored = 3;
  int32 table_count = 4;
  int32 view_count = 5;
  int32 procedure_count = 6;
  int32 function_count = 7;
  int32 non_schema_bound_object_count = 8;
  string largest_table_name = 9;
  int64 largest_table_row_count = 10;
  double largest_table_reserved_mb = 11;
}

message CymBuildSchemaObjectCountContract {
  string schema_name = 1;
  int32 table_count = 2;
  int32 view_count = 3;
  int32 procedure_count = 4;
  int32 function_count = 5;
  int32 total_object_count = 6;
}

message CymBuildSchemaIntegrityCheckContract {
  string check_name = 1;
  bool is_ok = 2;
  string status_text = 3;
  string detail = 4;
}

message CymBuildSchemaLargestTableContract {
  string schema_name = 1;
  string table_name = 2;
  int64 row_count = 3;
  double reserved_mb = 4;
  double used_mb = 5;
  double data_mb = 6;
  double index_mb = 7;
}

message CymBuildSchemaBoundObjectContract {
  string schema_name = 1;
  string object_name = 2;
  string object_type = 3;
  string object_type_desc = 4;
  bool is_schema_bound = 5;
  string status_text = 6;
}

message GetWaitStatsDashboardRequest {
  int32 top_count = 1;
  double cpu_pressure_signal_threshold_pct = 2;
}

message GetWaitStatsDashboardResponse {
  WaitStatsDashboardSummaryContract summary = 1;
  repeated WaitCategoryDistributionContract categories = 2;
  repeated TopWaitTypeContract top_waits = 3;
  repeated ActiveWaitContract active_waits = 4;
  SignalResourceWaitSummaryContract signal_resource_summary = 5;
  repeated WaitRecommendationContract recommendations = 6;
}

message WaitStatsDashboardSummaryContract {
  google.protobuf.Timestamp snapshot_utc = 1;
  string database_name = 2;
  string server_name = 3;
  google.protobuf.Timestamp sql_server_start_time = 4;
  int32 seconds_since_restart = 5;
  int64 total_wait_time_ms = 6;
  double total_wait_time_seconds = 7;
  int64 total_signal_wait_time_ms = 8;
  double total_signal_wait_time_seconds = 9;
  int64 total_resource_wait_time_ms = 10;
  double total_resource_wait_time_seconds = 11;
  double signal_wait_pct = 12;
  double resource_wait_pct = 13;
  bool is_cpu_pressure_highlighted = 14;
  string cpu_pressure_message = 15;
}

message WaitCategoryDistributionContract {
  string wait_category = 1;
  int64 wait_time_ms = 2;
  double wait_time_seconds = 3;
  int64 signal_wait_time_ms = 4;
  int64 resource_wait_time_ms = 5;
  int64 waiting_tasks_count = 6;
  double pct_of_total_wait_time = 7;
}

message TopWaitTypeContract {
  string wait_type = 1;
  string wait_category = 2;
  int64 waiting_tasks_count = 3;
  int64 wait_time_ms = 4;
  double wait_time_seconds = 5;
  int64 signal_wait_time_ms = 6;
  double signal_wait_seconds = 7;
  int64 resource_wait_time_ms = 8;
  double resource_wait_seconds = 9;
  int64 max_wait_time_ms = 10;
  double avg_wait_ms_per_task = 11;
  double pct_of_total_wait_time = 12;
  double pct_signal_within_wait = 13;
}

message ActiveWaitContract {
  google.protobuf.Timestamp snapshot_utc = 1;
  int32 session_id = 2;
  int32 request_id = 3;
  string status = 4;
  string command = 5;
  string wait_type = 6;
  int64 current_wait_ms = 7;
  string last_wait_type = 8;
  string wait_resource = 9;
  bool has_blocking_session_id = 10;
  int32 blocking_session_id = 11;
  int64 cpu_time_ms = 12;
  int64 total_elapsed_time_ms = 13;
  int64 reads = 14;
  int64 writes = 15;
  int64 logical_reads = 16;
  int64 granted_query_memory = 17;
  bool has_dop = 18;
  int32 dop = 19;
  bool has_parallel_worker_count = 20;
  int32 parallel_worker_count = 21;
  string database_name = 22;
  string host_name = 23;
  string program_name = 24;
  string login_name = 25;
  string running_statement = 26;
  string batch_text = 27;
}

message SignalResourceWaitSummaryContract {
  int64 total_wait_time_ms = 1;
  int64 signal_wait_time_ms = 2;
  int64 resource_wait_time_ms = 3;
  double signal_wait_pct = 4;
  double resource_wait_pct = 5;
  string signal_wait_assessment = 6;
}

message WaitRecommendationContract {
  int32 priority = 1;
  string pattern = 2;
  string recommendation = 3;
  string supporting_metric = 4;
}


