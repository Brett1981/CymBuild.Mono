}

message SageInboundPaymentSyncRequestMessage {
  string cym_build_document_guid = 1;
  bool force = 2;
}

message SageInboundPaymentSyncResultItemMessage {
  int64 external_transaction_id = 1;
  int64 matched_transaction_id = 2;
  int32 matched_invoice_request_id = 3;
  int32 matched_job_id = 4;
  string match_rule = 5;
}

message SageInboundPaymentSyncReply {
  string cym_build_document_guid = 1;
  bool is_success = 2;
  bool is_retryable_failure = 3;
  string message = 4;
  int32 external_transaction_count = 5;
  int32 external_allocation_count = 6;
  int32 reconciled_invoice_count = 7;
  int32 reconciled_allocation_count = 8;
  int32 updated_invoice_request_count = 9;
  repeated SageInboundPaymentSyncResultItemMessage items = 10;
}

message DocumentsEmailAttachmentRef {
  string driveId = 1;
  string itemId = 2;
