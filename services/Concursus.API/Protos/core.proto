syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "google/protobuf/any.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/wrappers.proto";

option csharp_namespace = "Concursus.API.Core";

package core;

service Core {
  rpc DashboardMetricsGet (DashboardMetricsGetRequest) returns (DashboardMetricsGetResponse);
  rpc DataObjectDelete (DataObjectDeleteRequest) returns (DataObjectDeleteResponse);
  rpc DataObjectGet (DataObjectGetRequest) returns (DataObjectGetResponse);
  rpc DataObjectListGet(DataObjectGetRequest) returns (stream DataObjectListGetResponse);
  rpc DataObjectListGetSingle(DataObjectGetRequest) returns (DataObjectListGetResponse);
  rpc DataObjectUpsert (DataObjectUpsertRequest) returns (DataObjectUpsertResponse);
    rpc DocumentsCreateFolder (DocumentsCreateFolderRequest) returns (DocumentsCreateFolderResponse);
  rpc DocumentsDelete (DocumentsDeleteRequest) returns (DocumentsDeleteResponse);
  rpc DocumentsDownload (DocumentsDownloadRequest) returns (DocumentsDownloadResponse);
  rpc DocumentsList (DocumentsListRequest) returns (DocumentsListResponse);
  rpc DocumentsResolve (DocumentsResolveRequest) returns (DocumentsResolveResponse);
  rpc DocumentsUpload (DocumentsUploadRequest) returns (DocumentsUploadResponse);

  rpc DownloadFile (FileRequest) returns (stream ChunkMsg);
  rpc DropDownDataList (DropDownDataListRequest) returns (DropDownDataListReply);
  rpc DropDownListDefinitionGet (DropDownListDefinitionGetRequest) returns (DropDownListDefinitionGetResponse);
  rpc EntityPropertyDefaultGet (EntityPropertyDefaultRequest) returns (EntityPropertyDefaultResponse);
  rpc EntityTypeGet (EntityTypeGetRequest) returns (EntityTypeGetResponse);
  rpc ExecuteMenuItemPost (ExecuteMenuItemRequest) returns (ExecuteMenuItemResponse);
  rpc GetMergeDocumentItems (GetMergeDocumentItemsRequest) returns (GetMergeDocumentItemsResponse);
  rpc GetMergeDocumentItemIncludes (GetMergeDocumentItemIncludesRequest) returns (GetMergeDocumentItemIncludesResponse);
  rpc GetMergeDocumentItemTypes (GetMergeDocumentItemTypesRequest) returns (GetMergeDocumentItemTypesResponse);
  rpc GridDataList (GridDataListRequest) returns (GridDataListReply);
  rpc GridDefinitionList (GridDefinitionListRequest) returns (GridDefinitionListReply);
  rpc GridDefinitionUpsert (GridDefinitionUpsertRequest) returns (GridDefinitionUpsertReply);
  rpc GridViewColumnDefinitionDelete (GridViewColumnDefinitionDeleteRequest) returns (GridViewColumnDefinitionDeleteReply);
  rpc GridViewColumnDefinitions (GridViewColumnDefinitionsRequest) returns (GridViewColumnDefinitionsReply);
  rpc GridViewColumnDefinitionUpsert (GridViewColumnDefinitionUpsertRequest) returns (GridViewColumnDefinitionUpsertReply);
  rpc GridViewDefinitions (GridViewDefinitionsRequest) returns (GridViewDefinitionsReply);
  rpc GridViewDefinitionUpsert (GridViewDefinitionUpsertRequest) returns (GridViewDefinitionUpsertReply);
  rpc NotificationsForUserGet (NotificationsForUserGetRequest) returns (NotificationsForUserGetResponse);
  rpc ObjectSecurityList (ObjectSecurityListRequest) returns (ObjectSecurityListResponse);
  rpc ObjectSharePointPathCollectionGet (ObjectSharePointPathCollectionGetRequest) returns (ObjectSharePointPathCollectionGetResponse);
  rpc OrganisationalUnitsGet (OrganisationalUnitsGetRequest) returns (OrganisationalUnitsGetResponse);
  rpc RecentItemsCreate (RecentItem) returns (RecentItem);
  rpc RecentItemsGet (RecentItemRequest) returns (RecentItemResponse);
  rpc RecordHistoryGet (RecordHistoryGetRequest) returns (RecordHistoryGetResponse);
  rpc RecordUrlGet (RecordUrlGetRequest) returns (RecordUrlGetResponse);
  rpc ReportingParametersGet (ReportingParametersGetRequest) returns (ReportingParametersGetResponse);
  rpc ReportingTemplatesGet (ReportingTemplatesGetRequest) returns (ReportingTemplatesGetResponse);
  rpc ReportUpsert (ReportUpsertRequest) returns (ReportUpsertResponse);
  rpc ScheduleItemsGet (ScheduleItemsGetRequest) returns (ScheduleItemsGetResponse);
  rpc ScheduleItemStatusGet (ScheduleItemStatusGetRequest) returns (ScheduleItemStatusGetResponse);
  rpc ScheduleItemTypesGet (ScheduleItemTypesGetRequest) returns (ScheduleItemTypesGetResponse);
  rpc SharePointDocumentDetailsGet (SharePointDocumentDetailsGetRequest) returns (SharePointDocumentDetailsGetResponse);
  rpc SharepointDocumentsGet (SharepointDocumentsGetRequest) returns (SharepointDocumentsGetResponse);
  rpc SharePointCreate (SharePointCreateRequest) returns (SharePointCreateResponse);
  rpc SystemDataGet (google.protobuf.Empty) returns (SystemDataGetResponse);
  rpc UserGroupDelete (UserGroupDeleteRequest) returns (UserGroupDeleteResponse);
  rpc UserGroupList (UserGroupListRequest) returns (UserGroupListResponse);
  rpc UserInfoGet (UserInfoGetRequest) returns (UserInfoGetResponse);
  rpc UpdateUserSignature (UserInfoUpdateRequest) returns (UserInfoUpdateResponse);
  rpc UserPreferencesGet (UserPreferencesGetRequest) returns (UserPreferencesGetResponse);
  rpc UsersGet (UsersGetRequest) returns (UsersGetResponse);
  rpc UserGetByGuid (UserGetByGuidRequest) returns (UserGetByGuidResponse);
  rpc ExecuteGridMenuAction(ExecuteGridMenuItemRequest) returns (ExecuteGridMenuItemResponse);
  rpc UploadFile (SharePointFileUploadRequest) returns (SharePointFileUploadResponse);
  rpc UploadFileChunk(stream ChunkMsg) returns (UploadStatus);
  rpc GetSharePointURL(GetSharePointURLMessageRequest) returns (GetSharePointURLMessage); //CBLD-415
  rpc CheckPhotoFilesAtUrl(PhotoFileCheckRequest) returns (PhotoFileCheckResponse);
  rpc SaveWidgetLayout(WidgetLayoutPOST) returns (WidgetLayoutSaveResponse);
  rpc WidgetLayoutGet(WidgetLayoutGetRequest) returns (WidgetLayoutGetResponse);
  rpc ConvertTiffToPng (ConvertImageRequest) returns (ConvertImageResponse);
  rpc GetSignatoryInfo(GetSignatoryInfoRequest) returns (GetSignatoryInfoResponse);
  rpc LogUsage (UsageRequest) returns (UsageResponse);
  rpc GetUsageReport (UsageReportRequest) returns (UsageReportResponse);
  rpc GetTeamMembers (TeamRequest) returns (TeamMemberListResponse);
  rpc GetScheduledWork (TeamRequest) returns (AvailabilityListResponse);
  rpc ImportLegacyStatuses(ImportLegacyStatusesReq) returns (ImportLegacyStatusesRes);
  rpc GetQuoteDashboardData(GetQuoteDashboardDataReq) returns (GetQuoteDashboardDataRes);
  rpc GetThresholdsForOrgUnit(GetQuoteThresholdReq) returns (GetQuoteThresholdRes);

  rpc GetHolidays (HolidayReq) returns (PublicHolidayListResponse);
  rpc GetNonActivityEvents (GetNonActivityEventsReq) returns (NonActivityEventsResp);
  rpc GetScheduledActivities (ScheduledActivitiesReq) returns (ScheduledActivitiesRes);
  rpc GetOrganisationalUnitForUser (OrganisationalUnitForUserReq) returns (OrganisationalUnitForUserRes);
  rpc GetAutomatedInvoicingKPI(AutomatedInvoicingKPIReq) returns (AutomatedInvoicingKPIRes);
  rpc JobClosureDecision (JobClosureDecisionRequest) returns (JobClosureDecisionResponse);
  // Generic Approve/Reject for AUTHORISATION queue (Quotes/Enquiries/other)
  rpc AuthorisationDecision (AuthorisationDecisionRequest) returns (AuthorisationDecisionResponse);
  // CYB-43 Invoice Processing Mode (Automated/Manual/Paused)
  rpc JobInvoiceProcessingModeGet (JobInvoiceProcessingModeGetRequest) returns (JobInvoiceProcessingModeGetResponse);
  rpc JobInvoiceProcessingModeSet (JobInvoiceProcessingModeSetRequest) returns (JobInvoiceProcessingModeSetResponse);
  rpc JobInvoicePendingTriggerCountGet (JobInvoicePendingTriggerCountGetRequest) returns (JobInvoicePendingTriggerCountGetResponse);
  rpc JobInvoiceGenerateFromPendingTriggers (JobInvoiceGenerateFromPendingTriggersRequest) returns (google.protobuf.Empty);
  rpc JobInvoiceSchedulesGet (JobInvoiceSchedulesGetRequest) returns (JobInvoiceSchedulesGetResponse);

  rpc GetInvoiceRequestItemsByGuid (GetInvoiceRequestItemsByGuidReq) returns (GetInvoiceRequestItemsByGuidRes);
  rpc DeleteInvoiceRequest (DeleteInvoiceRequestReq) returns (DeleteInvoiceRequestRes);
  rpc GetWaitStatsDashboard (GetWaitStatsDashboardRequest) returns (GetWaitStatsDashboardResponse);
  rpc GetCymBuildSchemaDashboard (GetCymBuildSchemaDashboardRequest) returns (GetCymBuildSchemaDashboardResponse);

  rpc DocumentsDownloadFile (DocumentsDownloadFileRequest) returns (DocumentsDownloadFileResponse);
  rpc DocumentsDownloadFileStream (DocumentsDownloadFileStreamRequest) returns (stream DocumentsDownloadFileStreamResponse);

  rpc AddressLookupSearch (AddressLookupSearchRequest) returns (AddressLookupSearchResponse);
  rpc AddressLookupResolve (AddressLookupResolveRequest) returns (AddressLookupResolveResponse);

  rpc DocumentsNavigationGet (DocumentsNavigationGetRequest) returns (DocumentsNavigationGetResponse);

  rpc SageHealthGet (SageHealthGetRequest) returns (SageHealthGetResponse);
  rpc SageFetchSalesOrders (SageFetchSalesOrdersRequest) returns (SageFetchSalesOrdersResponse);
  rpc SageFetchCustomerTransactions (SageFetchCustomerTransactionsRequest) returns (SageFetchCustomerTransactionsResponse);
  rpc SageCreateSalesOrder (SageCreateSalesOrderRequest) returns (SageCreateSalesOrderResponse);
  rpc TransactionSageSubmissionRequeue (TransactionSageSubmissionRequeueRequest) returns (TransactionSageSubmissionRequeueReply);
  rpc DocumentsCreateEmailDraft(DocumentsCreateEmailDraftRequest)
      returns (DocumentsCreateEmailDraftResponse);
  rpc SageInboundPaymentSync (SageInboundPaymentSyncRequestMessage) returns (SageInboundPaymentSyncReply);
  rpc SageInboundPaymentSyncEnqueue (SageInboundPaymentSyncEnqueueRequestMessage) returns (SageInboundPaymentSyncEnqueueReply);
  rpc SageInboundDiagnosticsGet (SageInboundDiagnosticsGetRequest) returns (SageInboundDiagnosticsGetReply);
}

enum JobClosureDecisionType  {
  JOB_CLOSURE_DECISION_UNSPECIFIED = 0;
  JOB_CLOSURE_DECISION_APPROVE = 1;
  JOB_CLOSURE_DECISION_REJECT = 2;
}

// CYB-43 Invoice Processing Mode (0=Automated, 1=Manual, 2=Paused)
enum InvoiceProcessingMode {
  INVOICE_PROCESSING_MODE_AUTOMATED = 0;
  INVOICE_PROCESSING_MODE_MANUAL = 1;
  INVOICE_PROCESSING_MODE_PAUSED = 2;
}

message SageInboundDiagnosticsGetRequest {
  string statusCode = 1;
  string sageAccountReference = 2;
  string sageDocumentNo = 3;
  bool includeOnlyRetryableFailures = 4;
  bool includeOnlyRetryableFailuresSpecified = 5;
  int32 invoiceRequestId = 6;
  bool invoiceRequestIdSpecified = 7;
  int64 transactionId = 8;
  bool transactionIdSpecified = 9;
  int32 jobId = 10;
  bool jobIdSpecified = 11;
}

message SageInboundDiagnosticsRow {
  int64 id = 1;
  string guid = 2;
  int32 cymBuildEntityTypeId = 3;
  string cymBuildDocumentGuid = 4;
  int64 cymBuildDocumentId = 5;
  int32 invoiceRequestId = 6;
  int64 transactionId = 7;
  int32 jobId = 8;
  string sageDataset = 9;
  string sageAccountReference = 10;
  string sageDocumentNo = 11;
  string lastOperationName = 12;
  string statusCode = 13;
  bool isInProgress = 14;
  google.protobuf.Timestamp inProgressClaimedOnUtc = 15;
  google.protobuf.Timestamp lastSucceededOnUtc = 16;
  google.protobuf.Timestamp lastFailedOnUtc = 17;
  string lastError = 18;
  bool lastErrorIsRetryable = 19;
  bool lastErrorIsRetryableSpecified = 20;
  google.protobuf.Timestamp lastSourceWatermarkUtc = 21;
  google.protobuf.Timestamp updatedDateTimeUtc = 22;
  google.protobuf.Timestamp lastAttemptedOnUtc = 23;
  google.protobuf.Timestamp lastCompletedOnUtc = 24;
  bool lastAttemptIsSuccess = 25;
  bool lastAttemptIsSuccessSpecified = 26;
  string lastAttemptErrorMessage = 27;
  bool lastAttemptIsRetryableFailure = 28;
  bool lastAttemptIsRetryableFailureSpecified = 29;
  string lastAttemptResponseStatus = 30;
  string lastAttemptResponseDetail = 31;
  bool canRequeue = 32;
  bool canForceRequeue = 33;
}

message SageInboundDiagnosticsGetReply {
  repeated SageInboundDiagnosticsRow rows = 1;
}

message SageInboundPaymentSyncEnqueueRequestMessage {
  string cym_build_document_guid = 1;
  bool force_requeue = 2;
}

message SageInboundPaymentSyncEnqueueReply {
  string cym_build_document_guid = 1;
  bool is_success = 2;
