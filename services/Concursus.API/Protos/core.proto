  repeated string ccRecipients = 5;
  repeated string bccRecipients = 6;

  repeated DocumentsEmailAttachmentRef attachments = 7;

  string recordGuid = 8;
  int32 entityTypeId = 9;
  string recordNumber = 10;
  string recordDescription = 11;
  string recordLocation = 12;
}

message DocumentsCreateEmailDraftResponse {
  bool success = 1;
  string draftId = 2;
  string webLink = 3;
