message TransactionSageSubmissionRequeueRequest {
  repeated string transactionGuids = 1;
}

message TransactionSageSubmissionRequeueResultItem {
  int64 transactionId = 1;
  string transactionGuid = 2;
  bool resetStatusRow = 3;
  int32 resetOutboxRows = 4;
}

message TransactionSageSubmissionRequeueReply {
  int32 requeuedTransactionCount = 1;
  int32 resetOutboxRowCount = 2;
  int32 resetStatusRowCount = 3;
  string message = 4;
