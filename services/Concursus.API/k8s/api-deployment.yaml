apiVersion: apps/v1
kind: Deployment
metadata:
  name: cymbuild-api
  labels:
    app: cymbuild-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cymbuild-api
  template:
    metadata:
      labels:
        app: cymbuild-api
    spec:
      containers:
      - name: api
        image: your-registry.io/cymbuild/api:latest
        ports:
        - containerPort: 80
        env:
        - name: AzureAd__ClientSecret
          valueFrom:
            secretKeyRef:
              name: cymbuild-api-secrets
              key: azure-client-secret
        - name: Google__TranslateAPIKey
          valueFrom:
            secretKeyRef:
              name: cymbuild-api-secrets
              key: google-api-key
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"

---
